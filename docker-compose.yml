version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://fortispass:${POSTGRES_PASSWORD}@postgres:5432/fortispass
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_SIGN_KEY_SEED=${SERVER_SIGN_KEY_SEED}
      - SERVER_HMAC_KEY=${SERVER_HMAC_KEY}
      - RELAY_URL=${RELAY_URL}
      - SELF_HOSTED=true
      - MAX_DEVICES_PER_VAULT=${MAX_DEVICES_PER_VAULT:-3}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=fortispass
      - POSTGRES_USER=fortispass
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortispass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    security_opt: [no-new-privileges:true]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    security_opt: [no-new-privileges:true]

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports: ["443:443", "80:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on: [server]
    networks: [internal, external]
    security_opt: [no-new-privileges:true]

volumes:
  postgres_data:
  redis_data:

networks:
  internal: { internal: true }
  external: { driver: bridge }
